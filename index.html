<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="EuroOnly"><link rel="manifest" href="manifest.json"><title>Euro Price Only</title><style>*{box-sizing:border-box;font-family:-apple-system,sans-serif}body{margin:0;background:#101820;color:#f2f2f2;padding-bottom:20px}header{padding:16px;padding-top:calc(16px + env(safe-area-inset-top));background:#182636;text-align:center}h1{margin:0;font-size:18px}main{display:flex;flex-direction:column;gap:12px;padding:16px}.card{background:#1b2a3d;border:none;border-radius:14px;padding:20px;text-align:left;color:#f2f2f2;cursor:pointer;width:100%}.card h2{margin:0 0 8px;font-size:15px;color:#9fb3c8}.price{font-size:18px;font-weight:700;margin:0}.price.loading{color:#9fb3c8;font-size:14px;font-weight:400}.price.error{color:#ef4444;font-size:13px;font-weight:400}.frame-wrap{display:none;width:100%;height:60vh;border-radius:12px;overflow:hidden;margin-top:-6px;margin-bottom:12px}.frame-wrap.active{display:block}iframe{width:100%;height:100%;border:none;background:#fff}#loadAllBtn{display:block;margin:0 16px 16px;width:calc(100% - 32px);background:#3b82f6;color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}footer{padding:12px 16px;font-size:12px;color:#7f93a8;text-align:center}</style></head><body><header><h1>Euro / یورو Price</h1></header><main>
<button class="card" data-source="tgju"><h2>TGJU.org</h2><p class="price">Tap to check</p></button>

<button class="card" data-source="bonbast"><h2>Bonbast.com</h2><p class="price">Tap to view site inside app</p></button>
<div class="frame-wrap" id="frame-bonbast"><iframe loading="lazy"></iframe></div>

<button class="card" data-source="bonbast2"><h2>Bon-bast.com</h2><p class="price">Tap to view site inside app</p></button>
<div class="frame-wrap" id="frame-bonbast2"><iframe loading="lazy"></iframe></div>

<button class="card" data-source="navasan"><h2>Navasan.net</h2><p class="price">Tap to view site inside app</p></button>
<div class="frame-wrap" id="frame-navasan"><iframe loading="lazy"></iframe></div>
</main>
<button id="loadAllBtn">Load All 3 Sites Inside</button>
<footer>TGJU shows extracted price. Load All 3 opens the others directly below their cards.</footer><script src="app.js?v=9"></script></body></html>
