<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="EuroOnly"><link rel="manifest" href="manifest.json"><title>Euro Price Only</title><style>
:root { --bg: #0b1117; --card-bg: #162231; --card-active: #1d2d40; --text: #f2f2f2; --subtext: #8b9fb6; --accent: #3b82f6; --danger: #ef4444; --success: #10b981; }
* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: calc(30px + env(safe-area-inset-bottom)); }
header { padding: 16px; padding-top: calc(16px + env(safe-area-inset-top)); background: rgba(22, 34, 49, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: 0.5px; }
main { display: flex; flex-direction: column; gap: 14px; padding: 16px; }
.card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; text-align: left; color: var(--text); cursor: pointer; width: 100%; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.card:active { transform: scale(0.98); }
.card.active-card { border-radius: 16px 16px 0 0; background: var(--card-active); border-bottom: none; box-shadow: none; }
.card h2 { margin: 0 0 6px; font-size: 15px; color: var(--subtext); font-weight: 500; }
.price { font-size: 20px; font-weight: 700; margin: 0; transition: color 0.3s; }
.price.loading { color: var(--subtext); font-size: 15px; font-weight: 400; }
.price.error { color: var(--danger); font-size: 14px; font-weight: 500; }
.price.success { color: var(--success); }
.price.opened { color: var(--accent); font-size: 15px; font-weight: 500; }
.frame-wrap { display: none; width: 100%; height: 65vh; border-radius: 0 0 16px 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-top: -14px; background: #fff; border: 1px solid rgba(255,255,255,0.05); border-top: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
.frame-wrap.active { display: block; animation: slideDown 0.3s ease forwards; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
iframe { width: 100%; height: 100%; border: none; display: block; }
#loadAllBtn { display: block; margin: 8px 16px 24px; width: calc(100% - 32px); background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); transition: background 0.2s; }
#loadAllBtn:active { background: #2563eb; transform: scale(0.98); }
footer { padding: 0 16px; font-size: 13px; color: var(--subtext); text-align: center; line-height: 1.5; }
</style></head><body><header><h1>Euro / یورو Price</h1></header><main>

<button class="card" data-source="tgju"><h2>TGJU.org</h2><p class="price">Tap to check</p></button>

<button class="card" data-source="bonbast"><h2>Bonbast.com</h2><p class="price">Tap to open site</p></button>

<button class="card" data-source="bonbast2"><h2>Bon-bast.com</h2><p class="price">Tap to view site</p></button>
<div class="frame-wrap" id="frame-bonbast2"><iframe loading="lazy"></iframe></div>

<button class="card" data-source="navasan"><h2>Navasan.net</h2><p class="price">Tap to view site</p></button>
<div class="frame-wrap" id="frame-navasan"><iframe loading="lazy"></iframe></div>

</main>
<button id="loadAllBtn">Load Inline Sites</button>
<footer>TGJU extracts price. Bonbast opens in new tab (secure). Others load inline.</footer>
<script src="app.js?v=12"></script></body></html>
